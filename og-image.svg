<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#b91c1c"/>
      <stop offset="100%" stop-color="#991b1b"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fca5a5"/>
      <stop offset="100%" stop-color="#991b1b"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Geometric pattern -->
  <circle cx="578" cy="2" r="50" fill="#991b1b" opacity="0.18"/>
    <circle cx="1269" cy="-38" r="82" fill="#991b1b" opacity="0.13"/>
    <circle cx="1268" cy="1" r="81" fill="#991b1b" opacity="0.07"/>
    <circle cx="781" cy="401" r="22" fill="#991b1b" opacity="0.06"/>
    <circle cx="1112" cy="634" r="20" fill="#991b1b" opacity="0.13"/>
    <circle cx="749" cy="344" r="77" fill="#991b1b" opacity="0.12"/>
    <rect x="1031" y="580" width="35" height="69" rx="8" fill="#b91c1c" opacity="0.08" transform="rotate(23, 1134, 511)"/>
    <rect x="21" y="-85" width="89" height="62" rx="8" fill="#b91c1c" opacity="0.03" transform="rotate(38, 206, 61)"/>
    <rect x="1277" y="411" width="23" height="21" rx="8" fill="#b91c1c" opacity="0.07" transform="rotate(5, 825, 577)"/>
    <rect x="143" y="268" width="81" height="63" rx="8" fill="#b91c1c" opacity="0.14" transform="rotate(20, 168, 546)"/>
    <rect x="816" y="317" width="41" height="41" rx="8" fill="#b91c1c" opacity="0.12" transform="rotate(29, 567, 371)"/>
    <rect x="755" y="-39" width="32" height="94" rx="8" fill="#b91c1c" opacity="0.09" transform="rotate(12, 1194, 226)"/>
    <rect x="476" y="262" width="64" height="44" rx="8" fill="#b91c1c" opacity="0.15" transform="rotate(4, -70, 470)"/>
    <rect x="180" y="528" width="90" height="23" rx="8" fill="#b91c1c" opacity="0.07" transform="rotate(9, -3, 165)"/>
    <polygon points="16,381 42,433 -10,433" fill="#991b1b" opacity="0.10"/>
    <polygon points="164,585 254,765 74,765" fill="#991b1b" opacity="0.05"/>
    <polygon points="647,389 713,521 581,521" fill="#991b1b" opacity="0.13"/>
    <polygon points="615,606 697,770 533,770" fill="#991b1b" opacity="0.11"/>

  <!-- Wave at bottom -->
  <path d="M0,568 C360,599 840,537 1200,568 L1200,630 L0,630Z" fill="#991b1b" opacity="0.3"/>

  <!-- 중앙 텍스트 카드 -->
  <rect x="80" y="195" width="1040" height="260" rx="20" fill="rgba(0,0,0,0.35)" filter="url(#blur-bg)"/>
  <filter id="blur-bg"><feGaussianBlur stdDeviation="8"/></filter>

  <text x="600" y="270" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="44" font-weight="700" fill="#ffffff" letter-spacing="2">
    마포 노래방 정보
  </text>
  <text x="600" y="330" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="22" font-weight="400" fill="rgba(255,255,255,0.85)">
    마포 — 노래방
  </text>

  <!-- Accent line -->
  <line x1="450" y1="355" x2="750" y2="355" stroke="#fca5a5" stroke-width="3" stroke-linecap="round" opacity="0.8"/>

  <!-- 하단 CTA -->
  <rect x="440" y="385" width="320" height="40" rx="20" fill="#fca5a5" opacity="0.9"/>
  <text x="600" y="411" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="16" font-weight="600" fill="#ffffff">
    ▼ 자세히 보기
  </text>

  <!-- 상단 브랜드 -->
  <text x="60" y="55" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="18" font-weight="600" fill="rgba(255,255,255,0.6)">
    마포 마포 노래방 정보 — 노래방
  </text>
</svg>